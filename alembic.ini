# ─────────────────────────────────────────────────────────
#  ApexVision-Core — Alembic Configuration
#  Uso:
#    alembic upgrade head            → aplica todas las migraciones
#    alembic downgrade -1            → revierte la última
#    alembic revision --autogenerate -m "descripcion"  → crea migración
#    alembic history                 → historial de versiones
#    alembic current                 → versión actual en DB
# ─────────────────────────────────────────────────────────

[alembic]
# Ruta al directorio de migraciones (relativo a este archivo)
script_location = python/db/migrations

# La URL se sobreescribe en env.py desde settings para que
# .env sea la única fuente de verdad
sqlalchemy.url = postgresql+asyncpg://apex:apex@localhost:5432/apexvision

# Formato del nombre de archivo de cada migración
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone para los timestamps en los nombres de archivo
timezone = UTC

# Longitud del slug en el nombre de archivo
truncate_slug_length = 40

# No comparar tipos de servidor — evita falsos positivos con VARCHAR vs TEXT
compare_type = true

# Comparar server_default — detecta cambios en valores por defecto
compare_server_default = false

[post_write_hooks]
# Opcional: formatear migraciones con ruff al generarlas
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
