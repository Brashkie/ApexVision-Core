version: "3.9"

x-apex-env: &apex-env
  SECRET_KEY: ${SECRET_KEY}
  MASTER_API_KEY: ${MASTER_API_KEY}
  DATABASE_URL: postgresql+asyncpg://apex:apex@postgres:5432/apexvision
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  DEVICE: ${DEVICE:-cpu}
  DEBUG: ${DEBUG:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOCAL_STORAGE_PATH: /app/data
  DELTA_LAKE_PATH: /app/data/delta
  PARQUET_PATH: /app/data/parquet
  MODELS_PATH: /app/models

services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: apexvision-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *apex-env
      WORKERS: ${API_WORKERS:-4}
    volumes:
      - apex-data:/app/data
      - apex-models:/app/models
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [apex-net]

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: apexvision-worker
    restart: unless-stopped
    environment:
      <<: *apex-env
    volumes:
      - apex-data:/app/data
      - apex-models:/app/models
    depends_on:
      redis:    { condition: service_healthy }
      postgres: { condition: service_healthy }
    command: >
      celery -A python.celery_app worker
        --loglevel=info
        --concurrency=${CELERY_CONCURRENCY:-4}
        --queues=vision,batch,default
        --max-tasks-per-child=50
    networks: [apex-net]

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: apexvision-beat
    restart: unless-stopped
    environment: { <<: *apex-env }
    depends_on: [worker]
    command: >
      celery -A python.celery_app beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler
        --schedule /app/data/celerybeat-schedule
    networks: [apex-net]

  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: apexvision-flower
    restart: unless-stopped
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment: { <<: *apex-env }
    command: >
      celery -A python.celery_app flower
        --port=5555
        --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-apexvision}
    depends_on: [redis]
    networks: [apex-net]

  postgres:
    image: postgres:16-alpine
    container_name: apexvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex
      POSTGRES_DB: apexvision
    volumes:
      - apex-pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d apexvision"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [apex-net]

  redis:
    image: redis:7-alpine
    container_name: apexvision-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1
    volumes:
      - apex-redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [apex-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: apexvision-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api]
    networks: [apex-net]
    profiles: [prod]

volumes:
  apex-pgdata:
  apex-redis:
  apex-data:
  apex-models:

networks:
  apex-net:
    driver: bridge
